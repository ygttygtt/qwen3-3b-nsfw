# Qwen3-3B LoRA 微调配置

# 模型配置
model_name: "Qwen/Qwen3-3B"  # 或本地模型路径
use_lora: true
use_quantization: false  # 设为 true 使用 QLoRA

# LoRA 配置
lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"

# 数据配置
data_path: "data/train.jsonl"
max_length: 2048
eval_split: 0.1

# 训练配置
epochs: 3
batch_size: 2
eval_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 0.0002
weight_decay: 0.01
scheduler: "cosine"
warmup_ratio: 0.1

# 保存和日志
output_dir: "outputs"
logging_steps: 10
save_steps: 100
save_total_limit: 3
eval_steps: 100
report_to: "tensorboard"
run_name: "qwen3-3b-nsfw-lora"

# 优化选项
gradient_checkpointing: true