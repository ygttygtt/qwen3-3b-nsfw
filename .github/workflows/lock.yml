name: Lock Threads

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/lock-threads@v4
        with:
          issue-inactive-days: '30'
          pr-inactive-days: '30'
          issue-comment: >
            This issue has been automatically locked because there has not been
            any recent activity after it was closed. Please open a new issue
            for related bugs.
          pr-comment: >
            This pull request has been automatically locked because there has not been
            any recent activity after it was closed. Please open a new pull request
            for related changes.
          issue-lock-reason: 'resolved'
          pr-lock-reason: 'resolved'