name: First Issue

on:
  issues:
    types: [opened]

jobs:
  first-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check if first issue
        uses: actions/github-script@v6
        id: check
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: context.payload.issue.user.login,
              state: 'all'
            });

            const isFirstIssue = issues.length === 1;
            return { isFirstIssue };

      - name: Add first-issue label
        if: steps.check.outputs.isFirstIssue == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['first-issue']
            });

      - name: Comment on first issue
        if: steps.check.outputs.isFirstIssue == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `
                ## 🎉 恭喜！这是您的第一个 Issue！

                感谢您对本项目的关注和贡献。我们欢迎任何形式的反馈和建议。

                为了帮助我们更好地理解和解决您的问题，请确保：

                1. **详细描述问题** - 提供清晰的问题描述
                2. **复现步骤** - 说明如何复现问题
                3. **环境信息** - 包含操作系统、Python 版本、GPU 型号等信息
                4. **错误日志** - 附上相关的错误信息

                如果您有任何疑问，随时可以提问！
              `
            });