name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            感谢您提交第一个 Issue！🎉

            我们会尽快查看您的问题。为了帮助我们更好地理解和解决您的问题，请确保：

            1. 提供了详细的问题描述
            2. 包含了复现步骤
            3. 提供了环境信息
            4. 附上了相关的错误日志

            如果您有任何疑问，随时可以提问！
          pr-message: |
            感谢您提交第一个 Pull Request！🎉

            我们会尽快审查您的代码。为了加快审查过程，请确保：

            1. PR 描述清晰地说明了更改内容
            2. 包含了相关的测试
            3. 更新了必要的文档
            4. 遵循了项目的代码规范

            如果您有任何疑问，随时可以提问！