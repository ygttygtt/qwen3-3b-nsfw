name: Milestone Management

on:
  issues:
    types: [closed]
  pull_request_target:
    types: [closed]

jobs:
  update_milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Close milestone if all issues are closed
        uses: actions/github-script@v6
        with:
          script: |
            const milestone = context.payload.issue?.milestone || context.payload.pull_request?.milestone;

            if (!milestone) {
              console.log('No milestone associated with this issue/PR');
              return;
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              milestone: milestone.number,
              state: 'open'
            });

            if (issues.length === 0) {
              await github.rest.issues.updateMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: milestone.number,
                state: 'closed'
              });
              console.log(`Closed milestone: ${milestone.title}`);
            } else {
              console.log(`Milestone ${milestone.title} still has ${issues.length} open issues`);
            }